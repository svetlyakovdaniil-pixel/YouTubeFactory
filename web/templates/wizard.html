<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<title>YouTube Factory</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Segoe UI,Arial,sans-serif;
    max-width:900px;
    margin:auto;
    padding:40px;
}

.card{
    background:#1e293b;
    border-radius:16px;
    padding:25px;
}

select{
    width:100%;
    padding:14px;
    font-size:18px;
    margin-top:15px;
    margin-bottom:30px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    border-radius:12px;
    padding:14px 30px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

</style>

</head>

<body>

<h1>Мастер создания видео</h1>

<div class="card">

<form action="/wizard/create" method="post">

<label><b>Канал</b></label>

<select name="channel">

{% for channel in channels %}

<option value="{{ channel.name }}">
{{ channel.name }}
</option>

{% endfor %}

</select>

<button type="submit">
🎬 Создать видео
</button>

</form>

</div>

</body>

</html>
